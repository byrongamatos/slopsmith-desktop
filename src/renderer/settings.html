<div class="space-y-3">
    <div>
        <label class="block text-xs text-slate-400 mb-1">Audio Sync Offset</label>
        <div class="flex items-center gap-3">
            <input type="range" id="ae-sync-offset" min="-0.2" max="0.5" step="0.005" value="0.2"
                   class="flex-1 accent-blue-500">
            <span id="ae-sync-offset-label" class="text-sm text-slate-300 w-16 text-right">200ms</span>
        </div>
        <p class="text-xs text-slate-500 mt-1">Compensates for audio latency. Increase if music leads the tab, decrease if tab leads the music.</p>
    </div>
    <div>
        <label class="block text-xs text-slate-400 mb-1">DLC Folder</label>
        <div class="flex gap-2">
            <input type="text" id="ae-dlc-path" class="flex-1 bg-slate-700 border border-slate-600 rounded px-3 py-1.5 text-sm" readonly>
            <button id="ae-pick-dlc" class="px-3 py-1.5 rounded bg-slate-600 hover:bg-slate-500 text-sm">Browse</button>
        </div>
    </div>
    <div>
        <label class="block text-xs text-slate-400 mb-1">NAM Models Folder</label>
        <div class="flex gap-2">
            <input type="text" id="ae-nam-path" class="flex-1 bg-slate-700 border border-slate-600 rounded px-3 py-1.5 text-sm" readonly>
            <button id="ae-pick-nam" class="px-3 py-1.5 rounded bg-slate-600 hover:bg-slate-500 text-sm">Browse</button>
        </div>
    </div>
    <div>
        <label class="block text-xs text-slate-400 mb-1">Cabinet IRs Folder</label>
        <div class="flex gap-2">
            <input type="text" id="ae-ir-path" class="flex-1 bg-slate-700 border border-slate-600 rounded px-3 py-1.5 text-sm" readonly>
            <button id="ae-pick-ir" class="px-3 py-1.5 rounded bg-slate-600 hover:bg-slate-500 text-sm">Browse</button>
        </div>
    </div>
</div>
